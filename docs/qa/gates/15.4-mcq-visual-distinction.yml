top_issues:
  - id: "A11Y-001"
    severity: low
    finding: "prefers-reduced-motion: reduce not handled. Front-end spec requires animation collapse to 0.01ms. ElevationBadge hardcodes 130/150ms durations with no media query check. Animation is very short (barely perceptible), so impact is minimal."
    suggested_action: "Add prefers-reduced-motion check — either CSS media query on the badge or a useMediaQuery hook to set duration to 0.01ms."

